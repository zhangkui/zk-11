server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: charging-system
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

charging:
  reservation:
    time-out-minutes: 15
  queue:
    time-out-minutes: 10
  time-slots: 24
