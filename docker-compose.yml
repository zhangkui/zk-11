version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: charging-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: charging_system
      MYSQL_USER: charging
      MYSQL_PASSWORD: charging123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - charging-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.0-alpine
    container_name: charging-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - charging-network
    command: redis-server --requirepass redis123

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: charging-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/charging_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: charging
      SPRING_DATASOURCE_PASSWORD: charging123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis123
    depends_on:
      - mysql
      - redis
    networks:
      - charging-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: charging-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - charging-network

volumes:
  mysql-data:
  redis-data:

networks:
  charging-network:
    driver: bridge
